<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <title>Brew - Forgot Password</title>
    <style>
        .toggle-option {
            text-align: center;
            margin-bottom: 20px;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: #B98C00;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            padding: 5px 10px;
            transition: all 0.3s ease;
        }
        .toggle-btn:hover {
            text-decoration: underline;
        }
        .input-field {
            transition: all 0.3s ease;
        }
        .input-field.hide {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <form action="/forgot-password" method="post" class="forms" id="forgotForm">
            <div class="login-logo">
                <i class="fa fa-key"></i>
            </div>

            <h2>Forgot Password</h2>

            <!-- Flash Messages Display -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">
                            <i class="fa fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="toggle-option">
                <button type="button" class="toggle-btn" onclick="toggleField('username')">Use Username</button>
                <span>|</span>
                <button type="button" class="toggle-btn" onclick="toggleField('email')">Use Email</button>
            </div>

            <!-- Username Field -->
            <div id="username-field" class="input-field">
                <label for="username"><i class="fa fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username">
            </div>

            <!-- Email Field -->
            <div id="email-field" class="input-field hide">
                <label for="email"><i class="fa fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your registered email">
            </div>

            <button type="submit" class="login-btn">
                <i class="fa fa-paper-plane"></i> Send OTP
            </button>
        </form>

        <p class="signup-link"><a href="/login"><i class="fa fa-arrow-left"></i> Back to Login</a></p>
    </div>

    <script>
        let currentField = 'username';

        function toggleField(field) {
            currentField = field;
            const usernameField = document.getElementById('username-field');
            const emailField = document.getElementById('email-field');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            
            if (field === 'username') {
                usernameField.classList.remove('hide');
                emailField.classList.add('hide');
                usernameInput.required = true;
                emailInput.required = false;
                usernameInput.disabled = false;
                emailInput.disabled = true;
            } else {
                usernameField.classList.add('hide');
                emailField.classList.remove('hide');
                usernameInput.required = false;
                emailInput.required = true;
                usernameInput.disabled = true;
                emailInput.disabled = false;
            }
        }

        // Form validation
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            if (currentField === 'username') {
                const username = document.getElementById('username').value.trim();
                if (!username) {
                    e.preventDefault();
                    alert('Please enter your username');
                    return false;
                }
            } else {
                const email = document.getElementById('email').value.trim();
                if (!email) {
                    e.preventDefault();
                    alert('Please enter your email address');
                    return false;
                }
                if (!email.includes('@') || !email.includes('.')) {
                    e.preventDefault();
                    alert('Please enter a valid email address');
                    return false;
                }
            }
        });

        // Flash Messages Auto-Hide
        document.addEventListener('DOMContentLoaded', function() {
            const flashMessages = document.querySelectorAll('.flash-message');
            flashMessages.forEach(function(message) {
                setTimeout(function() {
                    message.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    message.style.opacity = '0';
                    message.style.transform = 'translateY(-20px)';
                    setTimeout(function() {
                        message.remove();
                    }, 500);
                }, 4000);
            });
        });
    </script>
</body>

</html>
