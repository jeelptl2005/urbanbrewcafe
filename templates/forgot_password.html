<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <title>Brew - Forgot Password</title>
</head>

<body>
    <div class="container">
        <form action="/forgot-password" method="post" class="forms" id="forgotForm">
            <div class="login-logo">
                <i class="fa fa-key"></i>
            </div>

            <h2>Forgot Password</h2>

            <!-- Flash Messages Display -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">
                            <i class="fa fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <p style="text-align: center; color: #555; margin-bottom: 20px; font-size: 14px;">
                Enter your username and registered email address to reset your password.
            </p>

            <label for="username"><i class="fa fa-user"></i> Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>

            <label for="email"><i class="fa fa-envelope"></i> Registered Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your registered email" required>

            <button type="submit" class="login-btn">
                <i class="fa fa-paper-plane"></i> Send OTP
            </button>
        </form>

        <p class="signup-link"><a href="/login"><i class="fa fa-arrow-left"></i> Back to Login</a></p>
    </div>
</body>

<script>
    // Form validation
    document.getElementById('forgotForm').addEventListener('submit', function(e) {
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        
        if (!username) {
            e.preventDefault();
            alert('Please enter your username');
            return false;
        }
        
        if (!email) {
            e.preventDefault();
            alert('Please enter your registered email address');
            return false;
        }
        
        if (!email.includes('@') || !email.includes('.')) {
            e.preventDefault();
            alert('Please enter a valid email address');
            return false;
        }
    });

    // Flash Messages Auto-Hide
    document.addEventListener('DOMContentLoaded', function() {
        const flashMessages = document.querySelectorAll('.flash-message');
        flashMessages.forEach(function(message) {
            setTimeout(function() {
                message.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                message.style.opacity = '0';
                message.style.transform = 'translateY(-20px)';
                setTimeout(function() {
                    message.remove();
                }, 500);
            }, 4000);
        });
    });
</script>

</html>
